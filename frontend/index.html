<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitBot - Gym CENFE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 400px;
      max-width: 100vw;
      height: 700px;
      max-height: 100vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .chat-header {
      background: linear-gradient(135deg, #b71c1c, #c62828);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-avatar {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h3 { font-size: 15px; font-weight: 700; }
    .header-info p { font-size: 12px; opacity: 0.85; margin-top: 1px; }

    .online-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #4caf50;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-reset {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-reset:hover { background: rgba(255,255,255,0.35); }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .message-group { display: flex; flex-direction: column; gap: 4px; }

    .message-label {
      font-size: 11px;
      color: #999;
      padding: 0 4px;
    }

    .message {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.bot {
      background: #f5f5f5;
      color: #222;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }

    .message.user {
      background: linear-gradient(135deg, #b71c1c, #c62828);
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .message-time {
      font-size: 10px;
      color: #bbb;
      padding: 0 4px;
    }

    .message-time.right { text-align: right; }

    /* Markdown en mensajes bot */
    .message.bot strong { font-weight: 700; color: #b71c1c; }
    .message.bot em { font-style: italic; }

    /* TYPING INDICATOR */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: #f5f5f5;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      max-width: 80px;
    }

    .typing-indicator.visible { display: flex; }

    .typing-dot {
      width: 7px; height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 8px;
    }

    .quick-reply-btn {
      background: white;
      border: 1.5px solid #b71c1c;
      color: #b71c1c;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-reply-btn:hover {
      background: #b71c1c;
      color: white;
    }

    /* INPUT */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
      align-items: center;
      background: white;
    }

    .message-input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .message-input:focus { border-color: #b71c1c; }
    .message-input::placeholder { color: #bbb; }

    .send-btn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #b71c1c, #c62828);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 12px rgba(183,28,28,0.4); }
    .send-btn:active { transform: scale(0.95); }

    /* WELCOME */
    .welcome-card {
      background: linear-gradient(135deg, #fff5f5, #fff);
      border: 1px solid #ffcdd2;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 4px;
    }

    .welcome-card .emoji { font-size: 36px; margin-bottom: 8px; }
    .welcome-card h4 { color: #b71c1c; font-size: 16px; margin-bottom: 6px; }
    .welcome-card p { color: #666; font-size: 13px; line-height: 1.5; }

    @media (max-width: 440px) {
      .chat-container { border-radius: 0; height: 100vh; }
    }
  </style>
</head>
<body>
<div class="chat-container">
  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-avatar">🏋️</div>
    <div class="header-info">
      <h3>FitBot · Gym CENFE</h3>
      <p><span class="online-dot"></span>En linea ahora · Tu mejor version empieza aqui</p>
    </div>
    <button class="btn-reset" onclick="resetChat()">↺ Reiniciar</button>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome-card">
      <div class="emoji">💪</div>
      <h4>Bienvenido a Gym CENFE</h4>
      <p>Soy FitBot, tu asistente personal. Estoy aqui para ayudarte a alcanzar tus metas de fitness.</p>
    </div>
  </div>

  <!-- TYPING -->
  <div style="padding: 0 16px 4px;">
    <div class="typing-indicator" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <!-- QUICK REPLIES -->
  <div class="quick-replies" id="quickReplies"></div>

  <!-- INPUT -->
  <div class="input-area">
    <input
      type="text"
      class="message-input"
      id="messageInput"
      placeholder="Escribe tu mensaje..."
      onkeydown="handleKey(event)"
      autocomplete="off"
    />
    <button class="send-btn" onclick="sendMessage()">&#9658;</button>
  </div>
</div>

<script>
  const API_URL = "http://localhost:8000";
  let sessionId = null;

  function getTime() {
    const now = new Date();
    return now.toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
  }

  function parseMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.*?)\*/g, "<em>$1</em>")
      .replace(/\n/g, "<br>");
  }

  function appendMessage(text, isUser = false) {
    const messages = document.getElementById("messages");
    const group = document.createElement("div");
    group.className = "message-group";

    if (!isUser) {
      const label = document.createElement("div");
      label.className = "message-label";
      label.textContent = "FitBot · Gym CENFE";
      group.appendChild(label);
    }

    const msg = document.createElement("div");
    msg.className = `message ${isUser ? "user" : "bot"}`;
    msg.innerHTML = parseMarkdown(text);
    group.appendChild(msg);

    const time = document.createElement("div");
    time.className = `message-time ${isUser ? "right" : ""}`;
    time.textContent = getTime();
    group.appendChild(time);

    messages.appendChild(group);
    messages.scrollTop = messages.scrollHeight;
  }

  function setQuickReplies(replies) {
    const container = document.getElementById("quickReplies");
    container.innerHTML = "";
    if (!replies || replies.length === 0) return;
    replies.forEach(reply => {
      const btn = document.createElement("button");
      btn.className = "quick-reply-btn";
      btn.textContent = reply;
      btn.onclick = () => {
        document.getElementById("messageInput").value = reply;
        sendMessage();
      };
      container.appendChild(btn);
    });
  }

  function showTyping(show) {
    document.getElementById("typing").classList.toggle("visible", show);
    if (show) {
      const messages = document.getElementById("messages");
      messages.scrollTop = messages.scrollHeight;
    }
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    setQuickReplies([]);
    appendMessage(text, true);
    showTyping(true);

    // Crear burbuja del bot vacia donde irán apareciendo los tokens
    const messages = document.getElementById("messages");
    const group = document.createElement("div");
    group.className = "message-group";
    const label = document.createElement("div");
    label.className = "message-label";
    label.textContent = "FitBot · Gym CENFE";
    const msgBubble = document.createElement("div");
    msgBubble.className = "message bot";
    const timeEl = document.createElement("div");
    timeEl.className = "message-time";
    timeEl.textContent = getTime();
    group.appendChild(label);
    group.appendChild(msgBubble);
    group.appendChild(timeEl);

    let rawText = "";
    let bubbleVisible = false;

    try {
      const res = await fetch(`${API_URL}/chat/stream`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop(); // guardar linea incompleta

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const json = line.slice(6).trim();
          if (!json) continue;

          const event = JSON.parse(json);

          if (event.type === "meta") {
            sessionId = event.session_id;
          }

          if (event.type === "token") {
            // No mostrar la linea de OPCIONES en el chat
            if (event.value && event.value.includes("OPCIONES:")) continue;

            if (!bubbleVisible) {
              showTyping(false);
              messages.appendChild(group);
              bubbleVisible = true;
            }
            rawText += event.value;
            // Limpiar posible linea OPCIONES del texto visible
            const displayText = rawText.replace(/\nOPCIONES:.*$/s, "");
            msgBubble.innerHTML = parseMarkdown(displayText);
            messages.scrollTop = messages.scrollHeight;
          }

          if (event.type === "done") {
            // Limpiar linea OPCIONES del texto final
            const cleanText = rawText.replace(/\nOPCIONES:.*$/s, "");
            msgBubble.innerHTML = parseMarkdown(cleanText);
            setQuickReplies(event.quick_replies || []);
          }
        }
      }

    } catch (err) {
      showTyping(false);
      if (!bubbleVisible) {
        msgBubble.innerHTML = "Lo siento, hubo un problema de conexion. Por favor intenta de nuevo.";
        messages.appendChild(group);
      }
      console.error(err);
    }
  }

  async function resetChat() {
    if (sessionId) {
      try {
        await fetch(`${API_URL}/reset/${sessionId}`, { method: "POST" });
      } catch (e) {}
    }
    sessionId = null;
    document.getElementById("messages").innerHTML = `
      <div class="welcome-card">
        <div class="emoji">💪</div>
        <h4>Bienvenido a Gym CENFE</h4>
        <p>Soy FitBot, tu asistente personal. Estoy aqui para ayudarte a alcanzar tus metas de fitness.</p>
      </div>`;
    setQuickReplies([]);

    // Saludo inicial
    setTimeout(() => {
      const welcomeMsg = `¡Hola! 💪 Bienvenido a **Gym CENFE** — *Tu mejor versión empieza aquí*. 🔥\n\nHoy es un excelente día para empezar a construir la mejor versión de ti mismo. ¡Estamos listos para acompañarte en cada paso!\n\nPara darte la información exacta que necesitas, dinos **¿qué buscas hoy?** 👇\n\n1️⃣ **CLASE DE PRUEBA GRATIS** — Ven a conocernos y entrena hoy sin costo 🆓\n2️⃣ **PLANES Y PRECIOS** — Conoce nuestras membresías desde $299/mes 💸\n3️⃣ **MISIÓN TRANSFORMACIÓN** — Bajar de peso o ganar músculo con Coach 📈\n4️⃣ **HORARIOS Y CLASES** — Spinning, Yoga, Zumba, Pilates y más 🗓️\n5️⃣ **YA SOY MIEMBRO** — Reservas, pagos o soporte 👤\n\n🎁 **BONO DE HOY:** Si te inscribes en las próximas 24 horas, ¡te regalamos la inscripción y un Plan Nutricional básico! 🍎✨\n\nEscribe el número de tu opción o selecciona un botón 👇`;
      appendMessage(welcomeMsg, false);
      setQuickReplies([
        "1️⃣ Clase de prueba gratis",
        "2️⃣ Ver planes y precios",
        "3️⃣ Quiero transformarme",
        "4️⃣ Horarios y clases",
        "5️⃣ Ya soy miembro"
      ]);
    }, 400);
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Saludo inicial al cargar
  window.onload = () => {
    setTimeout(() => {
      const welcomeMsg = `¡Hola! 💪 Bienvenido a **Gym CENFE** — *Tu mejor versión empieza aquí*. 🔥\n\nHoy es un excelente día para empezar a construir la mejor versión de ti mismo. ¡Estamos listos para acompañarte en cada paso!\n\nPara darte la información exacta que necesitas, dinos **¿qué buscas hoy?** 👇\n\n1️⃣ **CLASE DE PRUEBA GRATIS** — Ven a conocernos y entrena hoy sin costo 🆓\n2️⃣ **PLANES Y PRECIOS** — Conoce nuestras membresías desde $299/mes 💸\n3️⃣ **MISIÓN TRANSFORMACIÓN** — Bajar de peso o ganar músculo con Coach 📈\n4️⃣ **HORARIOS Y CLASES** — Spinning, Yoga, Zumba, Pilates y más 🗓️\n5️⃣ **YA SOY MIEMBRO** — Reservas, pagos o soporte 👤\n\n🎁 **BONO DE HOY:** Si te inscribes en las próximas 24 horas, ¡te regalamos la inscripción y un Plan Nutricional básico! 🍎✨\n\nEscribe el número de tu opción o selecciona un botón 👇`;
      appendMessage(welcomeMsg, false);
      setQuickReplies([
        "1️⃣ Clase de prueba gratis",
        "2️⃣ Ver planes y precios",
        "3️⃣ Quiero transformarme",
        "4️⃣ Horarios y clases",
        "5️⃣ Ya soy miembro"
      ]);
    }, 600);
  };
</script>
</body>
</html>
